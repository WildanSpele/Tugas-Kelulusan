<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  display:flex;
  height:100vh;
  background:#0f172a;
  color:#fff;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#020617;
  padding:20px;
  display:flex;
  flex-direction:column;
}

.sidebar h2{
  margin-bottom:30px;
  font-size:20px;
}

.sidebar a{
  color:#94a3b8;
  text-decoration:none;
  margin:10px 0;
  display:block;
  transition:0.3s;
}

.sidebar a:hover{
  color:#6366f1;
}

/* MAIN */
.main{
  flex:1;
  padding:30px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.user{
  font-size:14px;
  color:#94a3b8;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

/* BUTTON */
.logout{
  margin-top:auto;
  padding:10px;
  background:#ef4444;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* ANIMASI MASUK */
.fade-in{
  animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* CARD ANIMASI */
.card{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
  gap:20px;
animation:fadeIn 0.6s ease;
}

/* HOVER GLOW */
.card:hover{
  transform:translateY(-6px) scale(1.02);
  box-shadow:0 15px 40px rgba(99,102,241,0.4);
}

/* DARK/LIGHT MODE */
.light-mode{
  background:#f1f5f9;
  color:#111;
}

.light-mode .card{
  background:#fff;
  color:#111;
}

/* TOGGLE BUTTON */
.toggle-theme{
  cursor:pointer;
  padding:8px 12px;
  background: #333;
  border-radius:8px;
  font-size:12px;
}

/* NOTIF */
.notif{
  position:fixed;
  top:20px;
  right:20px;
  background:#22c55e;
  color:#fff;
  padding:10px 15px;
  border-radius:8px;
  display:none;
  z-index:9999;
}

/* LOADING SKELETON */
.skeleton{
  background:linear-gradient(90deg,#1e293b,#334155,#1e293b);
  background-size:200% 100%;
  animation:loading 1.5s infinite;
  height:100px;
  border-radius:10px;
}

@keyframes loading{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}

.light-mode .sidebar{
  background:#e2e8f0;
}

.light-mode .sidebar h2{
  color:#111;
}

.light-mode .sidebar a{
  color:#334155;
}

.light-mode .sidebar a:hover{
  color:#6366f1;
}

/* ================= RESPONSIVE ================= */

/* TABLET */
@media (max-width: 992px){
  .sidebar{
    width:180px;
  }

  .main{
    padding:20px;
  }
}

/* MOBILE */
@media (max-width: 768px){

  body{
    flex-direction:column;
  }

  /* SIDEBAR JADI TOPBAR */
  .sidebar{
    width:100%;
    flex-direction:row;
    justify-content:space-around;
    align-items:center;
    height:60px;
  }

  .sidebar h2{
    display:none;
  }

  .sidebar a{
    font-size:12px;
  }

  .logout{
    margin-top:0;
    padding:6px 10px;
    font-size:12px;
  }

  /* MAIN */
  .main{
    padding:15px;
  }

  /* HEADER */
  .header{
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
  }

  /* CARD GRID */
  .cards{
    grid-template-columns:1fr;
  }

  /* INPUT */
  input{
    font-size:14px;
  }

  button{
    font-size:14px;
  }
}

/* HP KECIL */
@media (max-width: 480px){
  .container{
    width:90%;
    padding:20px;
  }

  h1,h2{
    font-size:18px;
  }

  .card{
    padding:15px;
  }
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
  gap:20px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>My App</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="About School.html">Profile</a>
  <a href="setting.html">Settings</a>

  <button class="logout" onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">
  <div class="header">
  <h1>Dashboard</h1>
  <div>
    <span id="userEmail"></span>
    <span class="toggle-theme" onclick="toggleTheme()">🌙</span>
  </div>
</div>

  <div class="cards">
    <div class="card">
      <h3>Projects</h3>
      <p>12 Active</p>
    </div>

    <div class="card">
      <h3>Tasks</h3>
      <p>34 Pending</p>
    </div>

    <div class="card">
      <h3>Messages</h3>
      <p>5 New</p>
    </div>

    <div class="card">
      <h3>Performance</h3>
      <p>87%</p>
    </div>
  </div>

  <div class="cards" style="margin-top:30px;">

  <div class="card">
    <h3>Line Chart</h3>
    <canvas id="lineChart"></canvas>
  </div>

  <div class="card">
    <h3>Bar Chart</h3>
    <canvas id="barChart"></canvas>
  </div>
  
</div>

</div>

<div class="card fade-in" style="margin-top:30px;">
  <h3>Statistik Aktivitas</h3>
  <canvas id="myChart"></canvas>
</div>

<div class="notif" id="notifBox">Login Berhasil!</div>

<script>

    // CHART
const ctx = document.getElementById('myChart');

new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'],
    datasets: [{
      label: 'Aktivitas',
      data: [12, 19, 8, 15, 10, 20, 18],
      borderWidth: 2,
      tension: 0.4
    }]
  },
  options: {
    plugins: {
      legend: {
        labels: {
          color: '#fff'
        }
      }
    },
    scales: {
      x: {
        ticks: { color: '#aaa' }
      },
      y: {
        ticks: { color: '#aaa' }
      }
    }
  }
});

// 🔐 PROTEKSI LOGIN
if(localStorage.getItem("login") !== "true"){
  window.location.href = "Indeks.html";
}

// tampilkan email user
document.getElementById("userEmail").innerText =
  localStorage.getItem("userEmail");

// LOGOUT
function logout(){
  localStorage.removeItem("login");
  localStorage.removeItem("userEmail");
  window.location.href = "Indeks.html";
}


// NOTIF
function showNotif(msg){
  const n=document.getElementById("notifBox");
  n.innerText=msg;
  n.style.display="block";
  setTimeout(()=>n.style.display="none",2000);
}

// THEME
function toggleTheme(){
  document.body.classList.toggle("light-mode");
}

// CHART DATA
const commonOptions = {
  plugins:{legend:{labels:{color:'#aaa'}}},
  scales:{
    x:{ticks:{color:'#aaa'}},
    y:{ticks:{color:'#aaa'}}
  }
};

// LINE
new Chart(document.getElementById('lineChart'), {
  type: 'line',
  data: {
    labels: ['Sen','Sel','Rab','Kam','Jum','Sab','Min'],
    datasets: [{
      label: 'Aktivitas',
      data: [10,20,15,25,18,30,22],
      tension:0.4
    }]
  },
  options: commonOptions
});

// BAR
new Chart(document.getElementById('barChart'), {
  type: 'bar',
  data: {
    labels: ['Jan','Feb','Mar','Apr'],
    datasets: [{
      label: 'Pendaftaran',
      data: [12,19,7,14]
    }]
  },
  options: commonOptions
});

// PIE
new Chart(document.getElementById('pieChart'), {
  type: 'pie',
  data: {
    labels: ['Coding','Gaming','Design'],
    datasets: [{
      data: [40,30,30]
    }]
  }
});

// LOADING SIMULATION
window.onload = ()=>{
  showNotif("Selamat datang 👋");
};
</script>

</body>
</html>
