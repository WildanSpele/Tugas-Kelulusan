<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}

body{
  display:flex;
  height:100vh;
  background:#0f172a;
  color:#fff;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#020617;
  padding:20px;
  display:flex;
  flex-direction:column;
}

.sidebar h2{margin-bottom:20px}

.sidebar a{
  color:#94a3b8;
  text-decoration:none;
  margin:10px 0;
}

.sidebar a:hover{color:#6366f1}

/* MAIN */
.main{
  flex:1;
  padding:30px;
  overflow-y:auto;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:25px;
}

/* CARD */
.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  outline:none;
}

/* BUTTON */
button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#6366f1;
  color:white;
  cursor:pointer;
}

button:hover{background:#4f46e5}

/* TOGGLE */
.switch{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:10px;
}

/* LOGOUT */
.logout{
  margin-top:auto;
  background:#ef4444;
}

/* LIGHT MODE */
.light-mode{
  background:#f1f5f9;
  color:#111;
}

/* ===== LIGHT MODE FULL FIX ===== */

.light-mode{
  background:#f1f5f9;
  color:#111;
}

/* SIDEBAR */
.light-mode .sidebar{
  background:#e2e8f0;
}

.light-mode .sidebar h2{
  color:#111;
}

.light-mode .sidebar a{
  color:#334155;
}

.light-mode .sidebar a:hover{
  color:#6366f1;
}

/* MAIN AREA */
.light-mode .main{
  background:#f8fafc;
}

/* CARD */
.light-mode .card{
  background:#ffffff;
  color:#111;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* INPUT */
.light-mode input{
  background:#f1f5f9;
  color:#111;
  border:1px solid #cbd5e1;
}

/* BUTTON */
.light-mode button{
  background:#6366f1;
  color:#fff;
}

.light-mode .logout{
  background:#ef4444;
}

/* SWITCH TEXT */
.light-mode .switch span{
  color:#111;
}

/* Responsive */
/* ================= RESPONSIVE ================= */

/* TABLET */
@media (max-width: 992px){
  .sidebar{
    width:180px;
  }

  .main{
    padding:20px;
  }
}

/* MOBILE */
@media (max-width: 768px){

  body{
    flex-direction:column;
  }

  /* SIDEBAR JADI TOPBAR */
  .sidebar{
    width:100%;
    flex-direction:row;
    justify-content:space-around;
    align-items:center;
    height:60px;
  }

  .sidebar h2{
    display:none;
  }

  .sidebar a{
    font-size:12px;
  }

  .logout{
    margin-top:0;
    padding:6px 10px;
    font-size:12px;
  }

  /* MAIN */
  .main{
    padding:15px;
  }

  /* HEADER */
  .header{
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
  }

  /* CARD GRID */
  .cards{
    grid-template-columns:1fr;
  }

  /* INPUT */
  input{
    font-size:14px;
  }

  button{
    font-size:14px;
  }
}

/* RESPONSIVE */
@media (max-width: 480px){
  .container{
    width:90%;
    padding:20px;
  }

  h1,h2{
    font-size:18px;
  }

  .card{
    padding:15px;
  }
}

/* ================= RESPONSIVE ================= */

/* TABLET */
@media (max-width: 992px){
  .sidebar{
    width:180px;
  }

  .main{
    padding:20px;
  }
}

/* MOBILE */
@media (max-width: 768px){

  body{
    flex-direction:column;
  }

  /* SIDEBAR JADI TOPBAR */
  .sidebar{
    width:100%;
    flex-direction:row;
    justify-content:space-around;
    align-items:center;
    height:60px;
  }

  .sidebar h2{
    display:none;
  }

  .sidebar a{
    font-size:12px;
  }

  .logout{
    margin-top:0;
    padding:6px 10px;
    font-size:12px;
  }

  /* MAIN */
  .main{
    padding:15px;
  }

  /* HEADER */
  .header{
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
  }

  /* CARD GRID */
  .cards{
    grid-template-columns:1fr;
  }

  /* INPUT */
  input{
    font-size:14px;
  }

  button{
    font-size:14px;
  }
}

/* HP KECIL */
@media (max-width: 480px){
  .container{
    width:90%;
    padding:20px;
  }

  h1,h2{
    font-size:18px;
  }

  .card{
    padding:15px;
  }
}

.light-mode .card{background:#fff;color:#111}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Settings</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="#">Settings</a>

  <button class="logout" onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <h1>Pengaturan</h1>
    <span id="userEmail"></span>
  </div>

  <!-- ACCOUNT -->
  <div class="card">
    <h3>👤 Account</h3>
    <p>Email: <b id="emailText"></b></p>

    <input type="password" id="newPass" placeholder="Password baru">
    <button onclick="changePassword()">Ganti Password</button>
  </div>

  <!-- APPEARANCE -->
  <div class="card">
    <h3>🌗 Appearance</h3>
    <div class="switch">
      <span>Dark Mode</span>
      <button onclick="toggleTheme()">Toggle</button>
    </div>
  </div>

  <!-- NOTIFICATION -->
  <div class="card">
    <h3>🔔 Notifications</h3>
    <div class="switch">
      <span>Notifikasi Login</span>
      <input type="checkbox" id="notifLogin" checked>
    </div>
  </div>

  <!-- SECURITY -->
  <div class="card">
    <h3>🔐 Security</h3>
    <p>Status: Login aktif</p>
    <button onclick="logout()">Logout Sekarang</button>
  </div>

  <!-- DATA -->
  <div class="card">
    <h3>💾 Data</h3>
    <button onclick="resetData()">Reset Semua Data</button>
  </div>

  <!-- ABOUT -->
  <div class="card">
    <h3>ℹ️ About</h3>
    <p>Dashboard XI TKJ 1</p>
    <p>Version 1.0</p>
  </div>

</div>

<script>
// PROTEKSI LOGIN
if(localStorage.getItem("login") !== "true"){
  window.location.href = "AI.html";
}

// LOAD USER
const email = localStorage.getItem("userEmail");
document.getElementById("userEmail").innerText = email;
document.getElementById("emailText").innerText = email;

// DARK MODE
function toggleTheme(){
  document.body.classList.toggle("light-mode");

  if(document.body.classList.contains("light-mode")){
    localStorage.setItem("theme","light");
  }else{
    localStorage.setItem("theme","dark");
  }
}

// LOAD THEME
if(localStorage.getItem("theme")==="light"){
  document.body.classList.add("light-mode");
}

// CHANGE PASSWORD (SIMULASI)
function changePassword(){
  const newPass = document.getElementById("newPass").value;

  if(!newPass){
    alert("Isi password baru!");
    return;
  }

  alert("Password berhasil diubah (simulasi)");
}

// RESET DATA
function resetData(){
  if(confirm("Yakin reset semua data?")){
    localStorage.clear();
    location.reload();
  }
}

// LOGOUT
function logout(){
  localStorage.removeItem("login");
  localStorage.removeItem("userEmail");
  window.location.href="AI.html";
}
</script>

</body>
</html>
